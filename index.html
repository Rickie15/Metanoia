<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Metanoia">
  <meta name="theme-color" content="#4A7459">
  <title>Metanoia</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant:wght@400;500&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    html,body{height:100%;font-family:'DM Sans',sans-serif;background:#C8D4BC;overscroll-behavior:none}
    #app{height:100%;display:flex;justify-content:center}
    .phone{width:375px;min-height:100vh;background:linear-gradient(165deg,#F6F1E6 0%,#ECF1E4 55%,#E0EBD8 100%);display:flex;flex-direction:column}
    .content{flex:1;overflow-y:auto;padding-bottom:4px}
    .glass{background:rgba(255,255,255,0.25);backdrop-filter:blur(22px);-webkit-backdrop-filter:blur(22px);border:1px solid rgba(255,255,255,0.5);border-radius:22px}
    .btn{cursor:pointer;border:none;font-family:'DM Sans',sans-serif;-webkit-appearance:none}
    .inp{width:100%;padding:11px 14px;border-radius:12px;border:1.5px solid rgba(74,116,89,.25);background:white;font-size:14px;font-family:'DM Sans',sans-serif;outline:none;box-sizing:border-box}
    .nav{display:flex;justify-content:space-around;padding:12px 0 26px;background:rgba(245,240,232,.92);backdrop-filter:blur(22px);-webkit-backdrop-filter:blur(22px);border-top:1px solid rgba(255,255,255,.6);flex-shrink:0}
    .nav-btn{display:flex;flex-direction:column;align-items:center;gap:2px;background:none;border:none;cursor:pointer;padding:0;font-family:'DM Sans',sans-serif}
    .sl{font-size:9px;color:#6B8C76;text-transform:uppercase;letter-spacing:.1em;font-weight:600}
    .modal-ov{position:fixed;inset:0;background:rgba(0,0,0,.45);display:flex;align-items:flex-end;justify-content:center;z-index:2000}
    .modal-ct{position:fixed;inset:0;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;z-index:2000}
    .msheet{width:375px;background:#F6F1E6;border-radius:28px 28px 0 0;padding:24px 20px 44px;max-height:85vh;overflow-y:auto}
    .mbox{width:300px;background:#F6F1E6;border-radius:24px;padding:24px 20px}
    .tag{background:rgba(74,116,89,.12);color:#4A7459;font-size:11px;font-weight:600;border-radius:8px;padding:3px 8px}
    .cimg{width:240px;height:240px;object-fit:contain;filter:drop-shadow(0 12px 24px rgba(50,80,50,.16));mask-image:linear-gradient(to bottom,black 55%,transparent 100%);-webkit-mask-image:linear-gradient(to bottom,black 55%,transparent 100%)}
    .heb{width:42px;height:42px;flex-shrink:0;border-radius:13px;display:flex;align-items:center;justify-content:center;font-size:19px;cursor:pointer;border:1.5px solid rgba(74,116,89,.25);background:rgba(255,255,255,.7)}
    .heb.done{background:#4A7459;border:none;box-shadow:0 4px 12px rgba(74,116,89,.3)}
    .pgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:0 16px}
    .pitem{border-radius:16px;overflow:hidden;aspect-ratio:1;position:relative}
    .pitem img{width:100%;height:100%;object-fit:cover}
    .pov{position:absolute;bottom:0;left:0;right:0;background:linear-gradient(transparent,rgba(0,0,0,.55));padding:8px 10px;display:flex;justify-content:space-between;align-items:center}
    ::-webkit-scrollbar{display:none}
    input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none}
  </style>
</head>
<body>
<div id="app"><div class="phone"><div class="content" id="content"></div><nav class="nav" id="nav"></nav></div></div>
<script>
const IMGS={morning:'./morning.png',afternoon:'./afternoon.png',workout:'./workout.png',night:'./night.png'};
const CHAR={
  morning:  {img:IMGS.morning,  g:"Bonjour! Pr\u00eate \u00e0 briller aujourd'hui? \uD83C\uDF3F",s:"Commence ta journ\u00e9e en beaut\u00e9"},
  afternoon:{img:IMGS.afternoon,g:"Belle journ\u00e9e! Tu avances bien \uD83D\uDC9A",              s:"Continue sur ta belle lanc\u00e9e"},
  workout:  {img:IMGS.workout,  g:"C'est l'heure de bouger! Let's go \uD83D\uDD25",              s:"Ton corps te remerciera"},
  night:    {img:IMGS.night,    g:"Soir\u00e9e bien m\u00e9rit\u00e9e, repose-toi \uD83C\uDF19", s:"Demain est une nouvelle journ\u00e9e"},
};
const SK={H:'mh6',C:'mc6',W:'mw6',M:'mm6',U:'mu6',P:'mp6'};
const CM2IN=0.393701;
const DH=[
  {id:'h1',emoji:'\uD83D\uDCA7',name:'Eau',            type:'water',  waterGoal:2000,targetCount:1},
  {id:'h2',emoji:'\u2696\uFE0F',name:'Me peser',       type:'weekly', waterGoal:2000,targetCount:3},
  {id:'h3',emoji:'\uD83D\uDCF8',name:'Photo progress.',type:'weekly', waterGoal:2000,targetCount:1},
  {id:'h4',emoji:'\uD83D\uDEB6\u200D\u2640\uFE0F',name:'Marcher 30min',type:'daily',waterGoal:2000,targetCount:1},
];
const JOURS=['L','M','M','J','V','S','D'];
const FIELDS=[['waist','Taille'],['hips','Hanches'],['chest','Poitrine'],['arms','Bras'],['thighs','Cuisses']];
const EMOJIS=['\u2B50','\uD83D\uDCA7','\uD83C\uDFC3','\uD83D\uDCAA','\uD83E\uDDD8','\uD83E\uDD57','\uD83C\uDF4E','\uD83D\uDE34','\uD83D\uDCD6','\u270F\uFE0F','\uD83C\uDFAF','\uD83D\uDD25','\uD83D\uDC8A','\uD83E\uDDEA','\uD83E\uDEA5','\u2696\uFE0F','\uD83D\uDCF8','\uD83D\uDEB6','\uD83D\uDEB4','\uD83C\uDFCB\uFE0F','\uD83E\uDD38','\uD83C\uDFCA','\uD83E\uDDF9','\uD83C\uDFA5','\uD83C\uDFA8','\uD83C\uDF3F','\u2615','\uD83C\uDF75','\uD83E\uDD64','\uD83D\uDECC'];

const DAY=()=>new Date().toISOString().split('T')[0];
function wkStart(){const d=new Date(),day=d.getDay(),diff=d.getDate()-day+(day===0?-6:1);const m=new Date(d);m.setDate(diff);m.setHours(0,0,0,0);return m.toISOString().split('T')[0];}
function addD(s,n){const d=new Date(s+'T00:00:00');d.setDate(d.getDate()+n);return d.toISOString().split('T')[0];}
function tState(){const h=new Date().getHours();if(h<11)return'morning';if(h<17)return'afternoon';if(h<20)return'workout';return'night';}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

let S={tab:'home',habits:null,comp:null,weight:null,meas:null,unit:'cm',photos:null,modal:null,wHid:null,wAmt:'250',nh:{emoji:'\u2B50',name:'',type:'daily',count:'1',goal:'2000',pk:false},delPid:null,showW:false,wVal:'',showM:false,mVal:{waist:'',hips:'',chest:'',arms:'',thighs:'',bf:''},sec:'weight'};

function load(){
  const g=(k,d)=>{try{const v=localStorage.getItem(k);return v?JSON.parse(v):d;}catch{return d;}};
  S.habits=g(SK.H,DH);S.comp=g(SK.C,{});S.weight=g(SK.W,[]);S.meas=g(SK.M,[]);
  S.unit=localStorage.getItem(SK.U)||'cm';S.photos=g(SK.P,[]);
}
function sv(){
  try{
    localStorage.setItem(SK.H,JSON.stringify(S.habits));
    localStorage.setItem(SK.C,JSON.stringify(S.comp));
    localStorage.setItem(SK.W,JSON.stringify(S.weight));
    localStorage.setItem(SK.M,JSON.stringify(S.meas));
    localStorage.setItem(SK.U,S.unit);
    localStorage.setItem(SK.P,JSON.stringify(S.photos));
  }catch(e){}
}

function wkCount(hid){const ws=wkStart();let c=0;for(let i=0;i<7;i++){if(S.comp[addD(ws,i)]?.[hid]?.done)c++;}return c;}
function isDone(h){
  const tc=S.comp[DAY()]||{};
  if(h.type==='daily')return!!tc[h.id]?.done;
  if(h.type==='daily_multiple')return(tc[h.id]?.count||0)>=h.targetCount;
  if(h.type==='water')return(tc[h.id]?.total||0)>=h.waterGoal;
  if(h.type==='weekly')return wkCount(h.id)>=h.targetCount;
  return false;
}
function doneC(){return S.habits.filter(isDone).length;}
function disp(cm){if(cm==null)return'\u2014';return S.unit==='cm'?cm.toFixed(1)+' cm':(cm*CM2IN).toFixed(1)+'"';}
function dispN(cm){return cm==null?null:S.unit==='cm'?cm:cm*CM2IN;}

function bNav(){
  return[['\uD83C\uDFE0','Accueil','home'],['\u2705','Habitudes','habits'],['\uD83D\uDCCA','Progr\u00e8s','progress'],['\uD83D\uDCF8','Photos','photos']]
  .map(([ic,lb,t])=>`<button class="nav-btn btn" data-a="nav" data-tab="${t}" style="opacity:${S.tab===t?1:.42}"><span style="font-size:20px">${ic}</span><span style="font-size:9px;color:${S.tab===t?'#4A7459':'#6B8C76'};font-weight:${S.tab===t?700:400}">${lb}</span>${S.tab===t?'<div style="width:3px;height:3px;border-radius:50%;background:#4A7459"></div>':''}</button>`).join('');
}

function bHome(){
  const cur=CHAR[tState()],tc=S.comp[DAY()]||{},dc=doneC(),tot=S.habits.length;
  const now=new Date().toLocaleTimeString('fr-CA',{hour:'2-digit',minute:'2-digit'});
  return`<div style="width:118px;height:33px;background:#1A2818;border-radius:0 0 18px 18px;margin:0 auto"></div>
  <div style="display:flex;justify-content:space-between;padding:10px 24px 0;font-size:12px;font-weight:600;color:#2B3D2E"><span>${now}</span><span style="font-size:11px">\u25CF\u25CF\u25CF WiFi \uD83D\uDD0B</span></div>
  <div style="display:flex;justify-content:space-between;align-items:center;padding:10px 20px 0">
    <div><div class="sl">Mon espace</div><div style="font-size:28px;font-weight:400;color:#2B3D2E;font-family:'Cormorant',Georgia,serif;letter-spacing:.08em;text-transform:uppercase">Metanoia</div></div>
    <div class="glass" style="width:42px;height:42px;display:flex;align-items:center;justify-content:center;border-radius:50%;font-size:18px">\uD83C\uDF3F</div>
  </div>
  <div style="display:flex;flex-direction:column;align-items:center;padding:4px 0 0">
    <img src="${cur.img}" class="cimg" onerror="this.style.opacity=.3" alt="">
    <div style="text-align:center;padding:0 24px;margin-top:6px">
      <div style="font-size:15px;font-weight:600;color:#2B3D2E;line-height:1.35">${cur.g}</div>
      <div style="font-size:11px;color:#6B8C76;margin-top:3px;font-weight:500">${cur.s}</div>
    </div>
  </div>
  <div style="padding:14px 16px 16px"><div class="glass" style="padding:14px 16px">
    <div style="display:flex;justify-content:space-between;margin-bottom:10px">
      <div><div class="sl">Aujourd'hui</div><div style="font-size:14px;font-weight:600;color:#2B3D2E">Mes habitudes</div></div>
      <div style="font-size:18px;font-weight:700;color:#4A7459">${dc}/${tot}</div>
    </div>
    <div style="height:4px;background:rgba(74,116,89,.12);border-radius:3px;margin-bottom:12px">
      <div style="height:100%;width:${tot?dc/tot*100:0}%;background:linear-gradient(90deg,#8DB89A,#4A7459);border-radius:3px"></div>
    </div>
    ${S.habits.map(h=>{const d=isDone(h);return`<div style="display:flex;align-items:center;gap:10px;margin-bottom:8px"><div style="width:32px;height:32px;flex-shrink:0;background:${d?'#4A7459':'rgba(255,255,255,.6)'};border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:15px;border:${d?'none':'1px solid rgba(74,116,89,.2)'}">${h.emoji}</div><span style="flex:1;font-size:12px;color:${d?'#2B3D2E':'#6B8C76'};font-weight:${d?500:400}">${esc(h.name)}</span>${d?'<span style="color:#4A7459;font-weight:700;font-size:14px">\u2713</span>':''}</div>`;}).join('')}
  </div></div>`;
}

function bHabits(){
  const today=DAY(),tc=S.comp[today]||{},ws=wkStart(),wd=JOURS.map((_,i)=>addD(ws,i));
  const wH=S.habits.filter(h=>h.type==='weekly'),dH=S.habits.filter(h=>h.type!=='weekly');
  const twD=wH.reduce((s,h)=>s+Math.min(wkCount(h.id),h.targetCount),0),twT=wH.reduce((s,h)=>s+h.targetCount,0);
  const tdD=dH.filter(isDone).length;
  const list=S.habits.map(h=>{
    const done=isDone(h),wc=wkCount(h.id),dc=tc[h.id]?.count||0,wt=tc[h.id]?.total||0;
    let st='';
    if(h.type==='water')st=`<div style="text-align:right"><div style="font-size:12px;font-weight:600;color:${done?'#4A7459':'#6B8C76'}">${wt}/${h.waterGoal}ml</div><div style="width:60px;height:4px;background:rgba(74,116,89,.15);border-radius:2px;margin-top:4px"><div style="height:100%;width:${Math.min(100,wt/h.waterGoal*100)}%;background:#4A7459;border-radius:2px"></div></div></div>`;
    else if(h.type==='weekly')st=`<span style="font-size:12px;font-weight:600;color:${done?'#4A7459':'#6B8C76'};text-align:center;line-height:1.2">${wc}/${h.targetCount}<br><span style="font-size:10px;color:#bbb">sem.</span></span>`;
    else if(h.type==='daily_multiple')st=`<span style="font-size:12px;font-weight:600;color:${done?'#4A7459':'#6B8C76'}">${dc}/${h.targetCount}</span>`;
    else if(done)st=`<span style="color:#4A7459;font-weight:700;font-size:16px">\u2713</span>`;
    const wa=(tc[h.id]?.amounts||[]).map(ml=>`<span class="tag">+${ml}ml</span>`).join('');
    const dots=h.type==='weekly'?`<div style="margin-top:10px;padding-top:10px;border-top:1px solid rgba(74,116,89,.08)"><div style="font-size:10px;color:#8B9E88;margin-bottom:6px">Progression cette semaine</div><div style="display:flex;gap:6px">${JOURS.map((j,i)=>{const d2=!!S.comp[wd[i]]?.[h.id]?.done,it=wd[i]===today;return`<div style="display:flex;flex-direction:column;align-items:center;gap:4px"><span style="font-size:9px;color:${it?'#4A7459':'#bbb'};font-weight:${it?700:400}">${j}</span><div style="width:18px;height:18px;border-radius:50%;background:${d2?'#4A7459':'rgba(74,116,89,.12)'};border:${it&&!d2?'2px solid #4A7459':'none'};display:flex;align-items:center;justify-content:center">${d2?'<span style="color:white;font-size:10px;font-weight:700">\u2713</span>':''}</div></div>`;}).join('')}</div></div>`:'';
    return`<div class="glass" style="padding:14px 16px;margin-bottom:10px"><div style="display:flex;align-items:center;gap:12px"><button class="heb btn${done?' done':''}" data-a="complete" data-id="${h.id}">${h.emoji}</button><div style="flex:1"><div style="font-size:14px;font-weight:600;color:#2B3D2E">${esc(h.name)}</div><div style="font-size:11px;color:#8B9E88;margin-top:2px">${h.type==='daily'?'Chaque jour':h.type==='daily_multiple'?h.targetCount+'x par jour':h.type==='weekly'?h.targetCount+'x par semaine':'Objectif: '+h.waterGoal+'ml'}</div></div>${st}<button class="btn" data-a="delh" data-id="${h.id}" style="background:none;color:#ddd;font-size:18px;padding:2px 4px;line-height:1">\u00D7</button></div>${h.type==='water'&&wa?`<div style="display:flex;flex-wrap:wrap;gap:5px;margin-top:10px;padding-top:10px;border-top:1px solid rgba(74,116,89,.08)">${wa}</div>`:''}${dots}</div>`;
  }).join('');
  const wm=S.wHid?`<div class="modal-ov" data-a="cwm"><div class="msheet" onclick="event.stopPropagation()"><div style="font-size:18px;font-weight:600;color:#2B3D2E;margin-bottom:16px">\uD83D\uDCA7 Ajouter de l'eau</div><div style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px">${[150,250,330,500,750,1000].map(ml=>`<button class="btn" data-a="swamt" data-amt="${ml}" style="background:${S.wAmt==ml?'#4A7459':'rgba(74,116,89,.1)'};color:${S.wAmt==ml?'white':'#4A7459'};border-radius:12px;padding:8px 14px;font-size:13px;font-weight:600">${ml}ml</button>`).join('')}</div><input class="inp" type="number" value="${S.wAmt}" placeholder="ml" oninput="S.wAmt=this.value"><div style="display:flex;gap:10px;margin-top:12px"><button class="btn" data-a="cwm" style="flex:1;padding:13px;background:rgba(74,116,89,.1);color:#4A7459;border-radius:14px;font-size:14px;font-weight:600">Annuler</button><button class="btn" data-a="addw" style="flex:2;padding:13px;background:#4A7459;color:white;border-radius:14px;font-size:14px;font-weight:600">+${S.wAmt}ml</button></div></div></div>`:'';
  const am=S.modal==='ah'?`<div class="modal-ov" data-a="cm"><div class="msheet" onclick="event.stopPropagation()"><div style="font-size:18px;font-weight:600;color:#2B3D2E;margin-bottom:18px">Nouvelle habitude</div><div style="margin-bottom:14px"><div class="sl" style="margin-bottom:6px">Emoji</div><button class="btn" data-a="tpk" style="font-size:26px;background:rgba(255,255,255,.7);border-radius:12px;width:48px;height:48px;border:1.5px solid rgba(74,116,89,.2)">${S.nh.emoji}</button>${S.nh.pk?`<div style="display:flex;flex-wrap:wrap;gap:6px;margin-top:8px;background:rgba(255,255,255,.8);border-radius:14px;padding:10px">${EMOJIS.map(e=>`<button class="btn" data-a="pke" data-e="${e}" style="font-size:22px;background:none;padding:4px">${e}</button>`).join('')}</div>`:''}</div><div style="margin-bottom:14px"><div class="sl" style="margin-bottom:6px">Nom</div><input class="inp" id="nhni" type="text" value="${esc(S.nh.name)}" placeholder="Ex: Boire de l'eau" oninput="S.nh.name=this.value"></div><div style="margin-bottom:14px"><div class="sl" style="margin-bottom:8px">Fr\u00e9quence</div>${[['daily','Chaque jour'],['weekly','X fois/semaine'],['daily_multiple','X fois/jour'],['water','Eau (ml)']].map(([t,lb])=>`<button class="btn" data-a="snht" data-t="${t}" style="display:block;width:100%;padding:11px 14px;margin-bottom:7px;background:${S.nh.type===t?'#4A7459':'rgba(255,255,255,.7)'};color:${S.nh.type===t?'white':'#2B3D2E'};border:${S.nh.type===t?'none':'1.5px solid rgba(74,116,89,.2)'};border-radius:13px;font-size:13px;font-weight:500;text-align:left">${lb}</button>`).join('')}</div>${S.nh.type==='weekly'||S.nh.type==='daily_multiple'?`<div style="margin-bottom:14px"><div class="sl" style="margin-bottom:8px">${S.nh.type==='weekly'?'Fois/semaine':'Fois/jour'}</div><div style="display:flex;gap:7px">${[1,2,3,4,5,6,7].map(n=>`<button class="btn" data-a="snhc" data-n="${n}" style="width:36px;height:36px;background:${S.nh.count==n?'#4A7459':'rgba(255,255,255,.7)'};color:${S.nh.count==n?'white':'#2B3D2E'};border:${S.nh.count==n?'none':'1.5px solid rgba(74,116,89,.2)'};border-radius:10px;font-size:14px;font-weight:600">${n}</button>`).join('')}</div></div>`:''}${S.nh.type==='water'?`<div style="margin-bottom:14px"><div class="sl" style="margin-bottom:8px">Objectif ml</div><div style="display:flex;gap:7px;flex-wrap:wrap">${[1500,2000,2500,3000].map(g=>`<button class="btn" data-a="snhg" data-g="${g}" style="padding:8px 12px;background:${S.nh.goal==g?'#4A7459':'rgba(255,255,255,.7)'};color:${S.nh.goal==g?'white':'#2B3D2E'};border:${S.nh.goal==g?'none':'1.5px solid rgba(74,116,89,.2)'};border-radius:10px;font-size:12px;font-weight:600">${g}ml</button>`).join('')}</div></div>`:''}<div style="display:flex;gap:10px;margin-top:8px"><button class="btn" data-a="cm" style="flex:1;padding:13px;background:rgba(74,116,89,.1);color:#4A7459;border-radius:14px;font-size:14px;font-weight:600">Annuler</button><button class="btn" data-a="svh" style="flex:2;padding:13px;background:#4A7459;color:white;border-radius:14px;font-size:14px;font-weight:600">Ajouter</button></div></div></div>`:'';
  return`<div style="padding:50px 20px 14px;display:flex;justify-content:space-between;align-items:center"><div style="font-size:22px;font-weight:600;color:#2B3D2E;font-family:'Cormorant',Georgia,serif;letter-spacing:.05em">Mes Habitudes</div><button class="btn" data-a="sah" style="background:#4A7459;color:white;border-radius:14px;padding:8px 14px;font-size:13px;font-weight:600">+ Ajouter</button></div>
  <div style="padding:0 16px;display:flex;gap:10px;margin-bottom:14px">
    <div class="glass" style="flex:1;padding:12px 14px"><div class="sl" style="margin-bottom:4px">Aujourd'hui</div><div style="font-size:20px;font-weight:700;color:#4A7459">${tdD}/${dH.length}</div><div style="font-size:11px;color:#8B9E88;margin-top:2px">habitudes faites</div></div>
    ${wH.length?`<div class="glass" style="flex:1;padding:12px 14px"><div class="sl" style="margin-bottom:4px">Cette semaine</div><div style="font-size:20px;font-weight:700;color:#4A7459">${twD}/${twT}</div><div style="height:4px;background:rgba(74,116,89,.12);border-radius:2px;margin-top:6px"><div style="height:100%;width:${twT?twD/twT*100:0}%;background:linear-gradient(90deg,#8DB89A,#4A7459);border-radius:2px"></div></div></div>`:''}
  </div>
  <div style="padding:0 16px 8px;font-size:10px;color:#8B9E88;font-weight:600;text-transform:uppercase;letter-spacing:.1em">\u2190 Appuie sur l'emoji pour cocher</div>
  <div style="padding:0 16px">${list}${S.habits.length===0?'<div style="text-align:center;color:#8B9E88;padding:40px;font-size:14px">Ajoute ta premi\u00e8re habitude \u2728</div>':''}</div>
  ${wm}${am}`;
}

function bProgress(){
  const lW=S.weight[S.weight.length-1],pW=S.weight[S.weight.length-2];
  const lM=S.meas[S.meas.length-1],pM=S.meas[S.meas.length-2];
  const bW={};
  S.weight.forEach(e=>{const d=new Date(e.date+'T00:00:00'),day=d.getDay(),diff=d.getDate()-day+(day===0?-6:1);const m=new Date(d);m.setDate(diff);const wk=m.toISOString().split('T')[0];if(!bW[wk])bW[wk]=[];bW[wk].push(e.weight);});
  const wkA=Object.entries(bW).sort(([a],[b])=>a.localeCompare(b)).map(([wk,ws])=>({wk,avg:ws.reduce((s,v)=>s+v,0)/ws.length}));
  function wChart(){
    if(wkA.length<2)return`<div style="text-align:center;color:#8B9E88;font-size:12px;padding:16px 0">Ajoute au moins 2 semaines de donn\u00e9es \uD83D\uDCCA</div>`;
    const vals=wkA.map(w=>w.avg),mn=Math.min(...vals)-2,mx=Math.max(...vals)+2,rng=mx-mn,W=300,H=70;
    const pts=wkA.map((w,i)=>({x:i/(wkA.length-1)*W,y:H-(w.avg-mn)/rng*H,v:w.avg}));
    const path=pts.map((p,i)=>`${i===0?'M':'L'} ${p.x} ${p.y}`).join(' ');
    return`<svg viewBox="0 0 ${W} ${H+20}" style="width:100%;height:90px;overflow:visible"><defs><linearGradient id="wg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#4A7459" stop-opacity=".2"/><stop offset="100%" stop-color="#4A7459" stop-opacity="0"/></linearGradient></defs><path d="${path} L ${W} ${H} L 0 ${H} Z" fill="url(#wg)"/><path d="${path}" stroke="#4A7459" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>${pts.map(p=>`<circle cx="${p.x}" cy="${p.y}" r="3.5" fill="#4A7459"/><text x="${p.x}" y="${p.y-7}" text-anchor="middle" font-size="9" fill="#4A7459" font-family="DM Sans" font-weight="600">${p.v.toFixed(1)}</text>`).join('')}</svg>`;
  }
  const wSec=`<div class="glass" style="padding:16px 18px"><div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px"><div><div class="sl">Poids actuel</div><div style="font-size:26px;font-weight:700;color:#4A7459">${lW?lW.weight+' lbs':'\u2014 lbs'}</div>${lW&&pW?`<div style="font-size:12px;color:#888;margin-top:1px">${lW.weight<pW.weight?'\u2193':'\u2191'} ${Math.abs(lW.weight-pW.weight).toFixed(1)} lbs</div>`:''} ${wkA.length?`<div style="font-size:11px;color:#8DB89A;margin-top:3px;font-weight:500">Moy. semaine: ${wkA[wkA.length-1].avg.toFixed(1)} lbs</div>`:''}</div><button class="btn" data-a="saw" style="background:#4A7459;color:white;border-radius:12px;padding:8px 14px;font-size:12px;font-weight:600">+ Ajouter</button></div>${wChart()}</div>${S.weight.length?`<div class="glass" style="padding:14px 16px"><div class="sl" style="margin-bottom:10px">Historique</div>${S.weight.slice().reverse().slice(0,6).map((e,i,arr)=>{const p=arr[i+1];return`<div style="display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:${i<Math.min(arr.length,6)-1?'1px solid rgba(74,116,89,.08)':'none'}"><span style="font-size:12px;color:#6B8C76">${new Date(e.date+'T12:00:00').toLocaleDateString('fr-CA')}</span><span style="font-size:14px;font-weight:600;color:#2B3D2E">${e.weight} lbs</span>${p?`<span style="font-size:11px;color:#888">${e.weight<p.weight?'\u2193':'\u2191'} ${Math.abs(e.weight-p.weight).toFixed(1)}</span>`:''}</div>`;}).join('')}</div>`:''}`;
  const mf=lM?FIELDS.filter(([k])=>lM[k]!=null).map(([key,label])=>{const c=lM[key],p=pM?.[key],cD=dispN(c),pD=p!=null?dispN(p):null,ar=pD!=null&&cD!=null&&Math.abs(cD-pD)>0.05?(cD>pD?'\u2191':'\u2193')+' '+Math.abs(cD-pD).toFixed(1):'';return`<div style="display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid rgba(74,116,89,.08)"><span style="font-size:13px;color:#6B8C76;font-weight:500">${label}</span><div style="display:flex;align-items:center;gap:10px">${ar?`<span style="font-size:11px;color:#888">${ar}</span>`:''}<span style="font-size:14px;font-weight:600;color:#2B3D2E">${disp(c)}</span></div></div>`;}).join(''):'';
  const bfh=lM?.bf!=null?`<div style="display:flex;justify-content:space-between;align-items:center;padding:9px 0"><span style="font-size:13px;color:#6B8C76;font-weight:500">% Gras</span><div style="display:flex;align-items:center;gap:10px">${pM?.bf!=null&&Math.abs(lM.bf-pM.bf)>0.05?`<span style="font-size:11px;color:#888">${lM.bf>pM.bf?'\u2191':'\u2193'} ${Math.abs(lM.bf-pM.bf).toFixed(1)}</span>`:''}<span style="font-size:14px;font-weight:600;color:#2B3D2E">${lM.bf}%</span></div></div>`:'';
  const mSec=`<div style="display:flex;justify-content:space-between;align-items:center"><button class="btn" data-a="tgu" style="background:rgba(255,255,255,.6);border:1.5px solid rgba(74,116,89,.3);border-radius:12px;padding:8px 14px;font-size:13px;font-weight:600;color:#4A7459">${S.unit==='cm'?'\uD83D\uDD04 En pouces':'\uD83D\uDD04 En cm'}</button><button class="btn" data-a="sam" style="background:#4A7459;color:white;border-radius:12px;padding:8px 14px;font-size:12px;font-weight:600">+ Ajouter</button></div>${lM?`<div class="glass" style="padding:16px 18px"><div class="sl" style="margin-bottom:12px">Derni\u00e8re entr\u00e9e \u00B7 ${new Date(lM.date+'T12:00:00').toLocaleDateString('fr-CA')}</div>${mf}${bfh}</div>`:'<div style="text-align:center;color:#8B9E88;font-size:13px;padding:32px">Ajoute ta premi\u00e8re mesure ! \uD83D\uDCCF</div>'}${S.meas.length>1?`<div class="glass" style="padding:14px 16px"><div class="sl" style="margin-bottom:10px">Historique</div>${S.meas.slice().reverse().slice(0,4).map(m=>`<div style="padding:8px 0;border-bottom:1px solid rgba(74,116,89,.08)"><div style="font-size:10px;color:#8B9E88;margin-bottom:5px">${new Date(m.date+'T12:00:00').toLocaleDateString('fr-CA')}</div><div style="display:flex;flex-wrap:wrap;gap:6px">${FIELDS.filter(([k])=>m[k]!=null).map(([k,lb])=>`<span class="tag">${lb}: ${disp(m[k])}</span>`).join('')}${m.bf!=null?`<span class="tag">Gras: ${m.bf}%</span>`:''}</div></div>`).join('')}</div>`:''}`;
  const awm=S.showW?`<div class="modal-ov" data-a="caw"><div class="msheet" onclick="event.stopPropagation()"><div style="font-size:18px;font-weight:600;color:#2B3D2E;margin-bottom:14px">\u2696\uFE0F Entrer mon poids</div><input class="inp" type="number" step="0.1" value="${S.wVal}" placeholder="Ex: 148.5 lbs" oninput="S.wVal=this.value"><div style="display:flex;gap:10px;margin-top:12px"><button class="btn" data-a="caw" style="flex:1;padding:13px;background:rgba(74,116,89,.1);color:#4A7459;border-radius:14px;font-size:14px;font-weight:600">Annuler</button><button class="btn" data-a="svw" style="flex:2;padding:13px;background:#4A7459;color:white;border-radius:14px;font-size:14px;font-weight:600">Sauvegarder</button></div></div></div>`:'';
  const amm=S.showM?`<div class="modal-ov" data-a="cam"><div class="msheet" onclick="event.stopPropagation()"><div style="font-size:18px;font-weight:600;color:#2B3D2E;margin-bottom:16px">\uD83D\uDCCF Mes mesures (${S.unit})</div>${FIELDS.map(([key,label])=>`<div style="margin-bottom:10px"><div class="sl" style="margin-bottom:5px">${label} (${S.unit})</div><input class="inp" type="number" step="0.1" value="${S.mVal[key]}" placeholder="${label} en ${S.unit}" oninput="S.mVal.${key}=this.value"></div>`).join('')}<div style="margin-bottom:14px"><div class="sl" style="margin-bottom:5px">% de gras</div><input class="inp" type="number" step="0.1" value="${S.mVal.bf}" placeholder="Ex: 22.5 %" oninput="S.mVal.bf=this.value"></div><div style="display:flex;gap:10px"><button class="btn" data-a="cam" style="flex:1;padding:13px;background:rgba(74,116,89,.1);color:#4A7459;border-radius:14px;font-size:14px;font-weight:600">Annuler</button><button class="btn" data-a="svm" style="flex:2;padding:13px;background:#4A7459;color:white;border-radius:14px;font-size:14px;font-weight:600">Sauvegarder</button></div></div></div>`:'';
  return`<div style="padding:50px 20px 14px"><div style="font-size:22px;font-weight:600;color:#2B3D2E;font-family:'Cormorant',Georgia,serif;letter-spacing:.05em">Progr\u00e8s</div></div>
  <div style="display:flex;gap:8px;padding:0 16px;margin-bottom:14px"><button class="btn" data-a="ps" data-s="weight" style="flex:1;padding:10px;background:${S.sec==='weight'?'#4A7459':'rgba(255,255,255,.5)'};color:${S.sec==='weight'?'white':'#6B8C76'};border-radius:14px;font-size:13px;font-weight:600">\u2696\uFE0F Poids</button><button class="btn" data-a="ps" data-s="measurements" style="flex:1;padding:10px;background:${S.sec==='measurements'?'#4A7459':'rgba(255,255,255,.5)'};color:${S.sec==='measurements'?'white':'#6B8C76'};border-radius:14px;font-size:13px;font-weight:600">\uD83D\uDCCF Dimensions</button></div>
  <div style="padding:0 16px;display:flex;flex-direction:column;gap:12px">${S.sec==='weight'?wSec:mSec}</div>${awm}${amm}`;
}

function bPhotos(){
  const dm=S.delPid?`<div class="modal-ct"><div class="mbox"><div style="font-size:16px;font-weight:600;color:#2B3D2E;margin-bottom:8px">Supprimer cette photo ?</div><div style="font-size:13px;color:#8B9E88;margin-bottom:20px">Action irr\u00e9versible.</div><div style="display:flex;gap:10px"><button class="btn" data-a="cdp" style="flex:1;padding:12px;background:rgba(74,116,89,.1);color:#4A7459;border-radius:12px;font-size:14px;font-weight:600">Annuler</button><button class="btn" data-a="dp" style="flex:1;padding:12px;background:#C62828;color:white;border-radius:12px;font-size:14px;font-weight:600">Supprimer</button></div></div></div>`:'';
  const grid=S.photos.length?`<div class="pgrid">${S.photos.slice().reverse().map(p=>`<div class="pitem"><img src="${p.dataUrl}" loading="lazy"><div class="pov"><span style="font-size:10px;color:white;font-weight:500">${new Date(p.date+'T12:00:00').toLocaleDateString('fr-CA')}</span><button class="btn" data-a="dpc" data-id="${p.id}" style="background:rgba(255,255,255,.25);border-radius:8px;width:24px;height:24px;font-size:12px">\uD83D\uDDD1\uFE0F</button></div></div>`).join('')}</div>`:`<div style="text-align:center;padding:56px 32px"><div style="font-size:52px;margin-bottom:16px">\uD83D\uDCF8</div><div style="font-size:16px;font-weight:600;color:#2B3D2E;margin-bottom:8px">Aucune photo encore</div><div style="font-size:13px;color:#8B9E88">Documente ta progression !</div></div>`;
  return`<div style="padding:50px 20px 14px;display:flex;justify-content:space-between;align-items:center"><div style="font-size:22px;font-weight:600;color:#2B3D2E;font-family:'Cormorant',Georgia,serif;letter-spacing:.05em">Mes Photos</div><button class="btn" data-a="ap" style="background:#4A7459;color:white;border-radius:14px;padding:8px 14px;font-size:13px;font-weight:600">\uD83D\uDCF8 Ajouter</button></div>${grid}${dm}<input type="file" id="fi" accept="image/*" style="display:none">`;
}

function render(){
  const screens={home:bHome,habits:bHabits,progress:bProgress,photos:bPhotos};
  document.getElementById('content').innerHTML=(screens[S.tab]||bHome)();
  document.getElementById('nav').innerHTML=bNav();
  const fi=document.getElementById('fi');
  if(fi)fi.onchange=handlePic;
}

const acts={
  nav(d){S.tab=d.tab;render();},
  ps(d){S.sec=d.s;render();},
  tgu(){S.unit=S.unit==='cm'?'in':'cm';sv();render();},
  complete(d){
    const h=S.habits.find(x=>x.id===d.id);if(!h)return;
    const today=DAY(),nc=JSON.parse(JSON.stringify(S.comp));
    if(!nc[today])nc[today]={};
    if(h.type==='daily')nc[today][d.id]={done:!nc[today][d.id]?.done};
    else if(h.type==='daily_multiple'){const c=nc[today][d.id]?.count||0;nc[today][d.id]={count:c>=h.targetCount?0:c+1};}
    else if(h.type==='weekly')nc[today][d.id]={done:!nc[today][d.id]?.done};
    else if(h.type==='water'){S.wHid=d.id;render();return;}
    S.comp=nc;sv();render();
  },
  delh(d){S.habits=S.habits.filter(h=>h.id!==d.id);sv();render();},
  sah(){S.modal='ah';S.nh={emoji:'\u2B50',name:'',type:'daily',count:'1',goal:'2000',pk:false};render();},
  cm(){S.modal=null;render();},
  tpk(){S.nh.pk=!S.nh.pk;render();},
  pke(d){S.nh.emoji=d.e;S.nh.pk=false;render();},
  snht(d){S.nh.type=d.t;render();},
  snhc(d){S.nh.count=d.n;render();},
  snhg(d){S.nh.goal=d.g;render();},
  svh(){
    if(!S.nh.name.trim())return;
    S.habits.push({id:Date.now().toString(),emoji:S.nh.emoji,name:S.nh.name.trim(),type:S.nh.type,targetCount:parseInt(S.nh.count)||1,waterGoal:parseInt(S.nh.goal)||2000});
    S.modal=null;sv();render();
  },
  cwm(){S.wHid=null;render();},
  swamt(d){S.wAmt=d.amt;render();},
  addw(){
    const ml=parseInt(S.wAmt)||0;if(!ml||!S.wHid)return;
    const today=DAY(),nc=JSON.parse(JSON.stringify(S.comp));
    if(!nc[today])nc[today]={};
    const prev=nc[today][S.wHid]||{amounts:[],total:0};
    nc[today][S.wHid]={amounts:[...(prev.amounts||[]),ml],total:(prev.total||0)+ml};
    S.comp=nc;S.wHid=null;S.wAmt='250';sv();render();
  },
  saw(){S.showW=true;S.wVal='';render();},
  caw(){S.showW=false;render();},
  svw(){
    const w=parseFloat(S.wVal);if(!w)return;
    S.weight=[...S.weight,{id:Date.now(),date:DAY(),weight:w}].sort((a,b)=>a.date.localeCompare(b.date));
    S.showW=false;S.wVal='';sv();render();
  },
  sam(){S.showM=true;S.mVal={waist:'',hips:'',chest:'',arms:'',thighs:'',bf:''};render();},
  cam(){S.showM=false;render();},
  svm(){
    const toIn=S.unit==='in',p=v=>v?parseFloat(toIn?parseFloat(v)*2.54:parseFloat(v)):null,mv=S.mVal;
    const e={id:Date.now(),date:DAY(),waist:p(mv.waist),hips:p(mv.hips),chest:p(mv.chest),arms:p(mv.arms),thighs:p(mv.thighs),bf:mv.bf?parseFloat(mv.bf):null};
    S.meas=[...S.meas,e].sort((a,b)=>a.date.localeCompare(b.date));
    S.showM=false;S.mVal={waist:'',hips:'',chest:'',arms:'',thighs:'',bf:''};sv();render();
  },
  ap(){document.getElementById('fi')?.click();},
  dpc(d){S.delPid=d.id;render();},
  cdp(){S.delPid=null;render();},
  dp(){S.photos=S.photos.filter(p=>String(p.id)!==String(S.delPid));S.delPid=null;sv();render();},
};

async function handlePic(e){
  const file=e.target.files[0];if(!file)return;
  const comp=await new Promise(res=>{
    const r=new FileReader();
    r.onload=ev=>{const img=new Image();img.onload=()=>{const c=document.createElement('canvas'),rt=Math.min(600/img.width,600/img.height);c.width=img.width*rt;c.height=img.height*rt;c.getContext('2d').drawImage(img,0,0,c.width,c.height);res(c.toDataURL('image/jpeg',.75));};img.src=ev.target.result;};
    r.readAsDataURL(file);
  });
  S.photos=[...S.photos,{id:Date.now(),date:DAY(),dataUrl:comp}];sv();render();e.target.value='';
}

document.getElementById('app').addEventListener('click',function(e){
  const el=e.target.closest('[data-a]');if(!el)return;
  const d={...el.dataset},a=d.a;delete d.a;
  acts[a]?.(d,e);
});

load();render();
</script>
</body>
</html>
