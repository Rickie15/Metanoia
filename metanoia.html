      return true;
    };

  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>

  <!-- App -->
  <script type="text/babel" data-presets="react">
const { useState, useEffect, useRef } = React;

// Utils
const DAY = () => new Date().toISOString().split("T")[0];
function getWeekStart() {
  const d = new Date(); const day = d.getDay();
  const diff = d.getDate() - day + (day === 0 ? -6 : 1);
  const m = new Date(d); m.setDate(diff); m.setHours(0,0,0,0);
  return m.toISOString().split("T")[0];
}
function addDays(s, n) {
  const d = new Date(s + "T00:00:00"); d.setDate(d.getDate() + n);
  return d.toISOString().split("T")[0];
}
function getTimeState() {
  const h = new Date().getHours();
  if (h < 11) return "morning"; if (h < 17) return "afternoon";
  if (h < 20) return "workout"; return "night";
}
const CM_TO_IN = 0.393701;
const SK = { H:"meta-h4", C:"meta-c4", W:"meta-w4", M:"meta-m4", U:"meta-u4", P:"meta-p4" };
const DEFAULT_HABITS = [
  { id:"h1", emoji:"💧", name:"Eau", type:"water", waterGoal:2000, targetCount:1 },
  { id:"h2", emoji:"⚖️", name:"Me peser", type:"weekly", targetCount:3, waterGoal:2000 },
  { id:"h3", emoji:"📸", name:"Photo progression", type:"weekly", targetCount:1, waterGoal:2000 },
  { id:"h4", emoji:"🚶‍♀️", name:"Marcher 30 min", type:"daily", targetCount:1, waterGoal:2000 },
];

const Glass = ({ children, style = {} }) => (
  <div style={{ background:"rgba(255,255,255,0.25)", backdropFilter:"blur(22px)",
    WebkitBackdropFilter:"blur(22px)", border:"1px solid rgba(255,255,255,0.5)",
    borderRadius:"22px", ...style }}>{children}</div>
);
const Btn = ({ children, onClick, style = {} }) => (
  <button onClick={onClick} style={{ fontFamily:"'DM Sans',sans-serif", cursor:"pointer", border:"none", ...style }}>{children}</button>
);
const Inp = ({ value, onChange, placeholder, type="text", step }) => (
  <input value={value} onChange={onChange} type={type} step={step} placeholder={placeholder}
    style={{ width:"100%", padding:"11px 14px", borderRadius:"12px",
      border:"1.5px solid rgba(74,116,89,.25)", background:"white",
      fontSize:"14px", fontFamily:"'DM Sans',sans-serif", outline:"none",
      boxSizing:"border-box" }} />
);


const CHAR = {
  morning:   { img: IMGS.morning,   greeting: "Bonjour! Prête à briller aujourd'hui? 🌿", sub: "Commence ta journée en beauté" },
  afternoon: { img: IMGS.afternoon, greeting: "Belle journée! Tu avances bien 💚",         sub: "Continue sur ta belle lancée"  },
  workout:   { img: IMGS.workout,   greeting: "C'est l'heure de bouger! Let's go 🔥",     sub: "Ton corps te remerciera"        },
  night:     { img: IMGS.night,     greeting: "Soirée bien méritée, repose-toi 🌙",       sub: "Demain est une nouvelle journée"},
};

export default function Metanoia() {
  const [tab, setTab] = useState("home");
  const [habits, setHabits] = useState(null);
  const [comp, setComp] = useState(null);
  const [weight, setWeight] = useState(null);
  const [meas, setMeas] = useState(null);
  const [unit, setUnit] = useState("cm");
  const [photos, setPhotos] = useState(null);
  const [ready, setReady] = useState(false);

  useEffect(() => {
    const l = document.createElement("link");
    l.href = "https://fonts.googleapis.com/css2?family=Cormorant:wght@400;500&family=DM+Sans:wght@400;500;600&display=swap";
    l.rel = "stylesheet"; document.head.appendChild(l);
  }, []);

  useEffect(() => {
    const g = (key, def) => { try { const v = localStorage.getItem(key); return v ? JSON.parse(v) : def; } catch { return def; } };
    setHabits(g(SK.H, DEFAULT_HABITS)); setComp(g(SK.C, {}));
    setWeight(g(SK.W, [])); setMeas(g(SK.M, []));
    setUnit(localStorage.getItem(SK.U) || "cm"); setPhotos(g(SK.P, []));
    setReady(true);
  }, []);

  const sv = {
    habits: v => { setHabits(v); try { localStorage.setItem(SK.H, JSON.stringify(v)); } catch {} },
    comp:   v => { setComp(v);   try { localStorage.setItem(SK.C, JSON.stringify(v)); } catch {} },
    weight: v => { setWeight(v); try { localStorage.setItem(SK.W, JSON.stringify(v)); } catch {} },
    meas:   v => { setMeas(v);   try { localStorage.setItem(SK.M, JSON.stringify(v)); } catch {} },
    unit:   v => { setUnit(v);   try { localStorage.setItem(SK.U, v);                } catch {} },
    photos: v => { setPhotos(v); try { localStorage.setItem(SK.P, JSON.stringify(v)); } catch {} },
  };

  if (!ready) return (
    <div style={{ display:"flex",justifyContent:"center",alignItems:"center",height:"100vh",
      fontFamily:"'DM Sans',sans-serif",color:"#4A7459",fontSize:"15px",fontWeight:"500",
      background:"linear-gradient(165deg,#F6F1E6,#E0EBD8)" }}>Chargement de Metanoia...</div>
  );

  const today = DAY();
  const todayComp = comp[today] || {};
  const ws = getWeekStart();

  function weeklyCount(hid) {
    let c = 0;
    for (let i = 0; i < 7; i++) { if (comp[addDays(ws, i)]?.[hid]?.done) c++; }
    return c;
  }
  function isDone(h) {
    if (h.type === "daily")          return !!todayComp[h.id]?.done;
    if (h.type === "daily_multiple") return (todayComp[h.id]?.count || 0) >= h.targetCount;
    if (h.type === "water")          return (todayComp[h.id]?.total || 0) >= h.waterGoal;
    if (h.type === "weekly")         return weeklyCount(h.id) >= h.targetCount;
    return false;
  }
  const doneCount = habits.filter(isDone).length;
  const p = { habits, comp, todayComp, weight, meas, unit, photos, sv, today, ws, weeklyCount, isDone, doneCount };
  const TABS = [["🏠","Accueil","home"],["✅","Habitudes","habits"],["📊","Progrès","progress"],["📸","Photos","photos"]];

  return (
    <div style={{ display:"flex",justifyContent:"center",minHeight:"100vh",background:"#C8D4BC",fontFamily:"'DM Sans',sans-serif" }}>
      <div style={{ width:"375px",minHeight:"100vh",background:"linear-gradient(165deg,#F6F1E6 0%,#ECF1E4 55%,#E0EBD8 100%)",display:"flex",flexDirection:"column" }}>
        <div style={{ flex:1,overflowY:"auto" }}>
          {tab==="home"     && <HomeScreen     {...p} />}
          {tab==="habits"   && <HabitsScreen   {...p} />}
          {tab==="progress" && <ProgressScreen {...p} />}
          {tab==="photos"   && <PhotosScreen   {...p} />}
        </div>
        <div style={{ display:"flex",justifyContent:"space-around",padding:"12px 0 26px",
          background:"rgba(245,240,232,.92)",backdropFilter:"blur(22px)",WebkitBackdropFilter:"blur(22px)",
          borderTop:"1px solid rgba(255,255,255,.6)",flexShrink:0 }}>
          {TABS.map(([ic,lb,t]) => (
            <button key={t} onClick={() => setTab(t)} style={{ display:"flex",flexDirection:"column",
              alignItems:"center",gap:"2px",opacity:tab===t?1:.42,background:"none",
              border:"none",cursor:"pointer",padding:0,fontFamily:"'DM Sans',sans-serif" }}>
              <span style={{ fontSize:"20px" }}>{ic}</span>
              <span style={{ fontSize:"9px",color:tab===t?"#4A7459":"#6B8C76",fontWeight:tab===t?"700":"400" }}>{lb}</span>
              {tab===t && <div style={{ width:"3px",height:"3px",borderRadius:"50%",background:"#4A7459" }} />}
            </button>
          ))}
        </div>
      </div>
    </div>
  );
}

// ── Habits ────────────────────────────────────────────────
function HabitsScreen({ habits, comp, todayComp, sv, today, ws, weeklyCount, isDone, doneCount }) {
  const [showAdd, setShowAdd] = useState(false);
  const [waterMod, setWaterMod] = useState(null);
  const [waterAmt, setWaterAmt] = useState("250");
  const JOURS = ["L","M","M","J","V","S","D"];
  const weekDays = JOURS.map((_,i) => addDays(ws,i));
  const weeklyHabits = habits.filter(h => h.type==="weekly");
  const totalWeeklyDone = weeklyHabits.reduce((s,h) => s + Math.min(weeklyCount(h.id), h.targetCount), 0);
  const totalWeeklyTarget = weeklyHabits.reduce((s,h) => s + h.targetCount, 0);
  const dailyHabits = habits.filter(h => h.type!=="weekly");
  const todayDoneCount = dailyHabits.filter(h => isDone(h)).length;

  function complete(h) {
    const nc = JSON.parse(JSON.stringify(comp));
    if (!nc[today]) nc[today] = {};
    if      (h.type==="daily")          nc[today][h.id] = { done: !todayComp[h.id]?.done };
    else if (h.type==="daily_multiple") { const c=todayComp[h.id]?.count||0; nc[today][h.id]={count:c>=h.targetCount?0:c+1}; }
    else if (h.type==="weekly")         nc[today][h.id] = { done: !todayComp[h.id]?.done };
    else if (h.type==="water")          { setWaterMod(h); return; }
    sv.comp(nc);
  }
  function addWater() {
    const ml = parseInt(waterAmt)||0; if (!ml||!waterMod) return;
    const nc = JSON.parse(JSON.stringify(comp));
    if (!nc[today]) nc[today] = {};
    const prev = nc[today][waterMod.id] || { amounts:[], total:0 };
    nc[today][waterMod.id] = { amounts:[...(prev.amounts||[]),ml], total:(prev.total||0)+ml };
    sv.comp(nc); setWaterMod(null); setWaterAmt("250");
  }

  return (
    <div>
      <div style={{ padding:"50px 20px 14px",display:"flex",justifyContent:"space-between",alignItems:"center" }}>
        <div style={{ fontSize:"22px",fontWeight:"600",color:"#2B3D2E",fontFamily:"'Cormorant',Georgia,serif",letterSpacing:".05em" }}>Mes Habitudes</div>
        <Btn onClick={() => setShowAdd(true)} style={{ background:"#4A7459",color:"white",borderRadius:"14px",padding:"8px 14px",fontSize:"13px",fontWeight:"600" }}>+ Ajouter</Btn>
      </div>

      {/* Summary cards */}
      <div style={{ padding:"0 16px",display:"flex",gap:"10px",marginBottom:"14px" }}>
        <Glass style={{ flex:1,padding:"12px 14px" }}>
          <div style={{ fontSize:"9px",color:"#6B8C76",textTransform:"uppercase",letterSpacing:".1em",fontWeight:"600",marginBottom:"4px" }}>Aujourd'hui</div>
          <div style={{ fontSize:"20px",fontWeight:"700",color:"#4A7459" }}>{todayDoneCount}/{dailyHabits.length}</div>
          <div style={{ fontSize:"11px",color:"#8B9E88",marginTop:"2px" }}>habitudes faites</div>
        </Glass>
        {weeklyHabits.length>0 && (
          <Glass style={{ flex:1,padding:"12px 14px" }}>
            <div style={{ fontSize:"9px",color:"#6B8C76",textTransform:"uppercase",letterSpacing:".1em",fontWeight:"600",marginBottom:"4px" }}>Cette semaine</div>
            <div style={{ fontSize:"20px",fontWeight:"700",color:"#4A7459" }}>{totalWeeklyDone}/{totalWeeklyTarget}</div>
            <div style={{ height:"4px",background:"rgba(74,116,89,.12)",borderRadius:"2px",marginTop:"6px" }}>
              <div style={{ height:"100%",width:`${totalWeeklyTarget?totalWeeklyDone/totalWeeklyTarget*100:0}%`,background:"linear-gradient(90deg,#8DB89A,#4A7459)",borderRadius:"2px" }} />
            </div>
          </Glass>
        )}
      </div>

      <div style={{ padding:"0 16px 8px",fontSize:"10px",color:"#8B9E88",fontWeight:"600",textTransform:"uppercase",letterSpacing:".1em" }}>
        ← Appuie sur l'emoji pour cocher
      </div>
      <div style={{ padding:"0 16px",display:"flex",flexDirection:"column",gap:"10px" }}>
        {habits.map(h => {
          const done = isDone(h);
          const wc = h.type==="weekly" ? weeklyCount(h.id) : 0;
          const dc = todayComp[h.id]?.count||0;
          const wt = todayComp[h.id]?.total||0;
          return (
            <Glass key={h.id} style={{ padding:"14px 16px" }}>
              <div style={{ display:"flex",alignItems:"center",gap:"12px" }}>
                <button onClick={() => complete(h)} style={{ width:"42px",height:"42px",flexShrink:0,
                  background:done?"#4A7459":"rgba(255,255,255,.7)",borderRadius:"13px",
                  display:"flex",alignItems:"center",justifyContent:"center",fontSize:"19px",
                  border:done?"none":"1.5px solid rgba(74,116,89,.25)",
                  boxShadow:done?"0 4px 12px rgba(74,116,89,.3)":"none",cursor:"pointer" }}>{h.emoji}</button>
                <div style={{ flex:1 }}>
                  <div style={{ fontSize:"14px",fontWeight:"600",color:"#2B3D2E" }}>{h.name}</div>
                  <div style={{ fontSize:"11px",color:"#8B9E88",marginTop:"2px" }}>
                    {h.type==="daily" && "Chaque jour"}
                    {h.type==="daily_multiple" && `${h.targetCount}x par jour`}
                    {h.type==="weekly" && `${h.targetCount}x par semaine`}
                    {h.type==="water" && `Objectif : ${h.waterGoal} ml`}
                  </div>
                </div>
                {h.type==="water" && (
                  <div style={{ textAlign:"right" }}>
                    <div style={{ fontSize:"12px",fontWeight:"600",color:done?"#4A7459":"#6B8C76" }}>{wt} / {h.waterGoal} ml</div>
                    <div style={{ width:"60px",height:"4px",background:"rgba(74,116,89,.15)",borderRadius:"2px",marginTop:"4px" }}>
                      <div style={{ height:"100%",width:`${Math.min(100,wt/h.waterGoal*100)}%`,background:"#4A7459",borderRadius:"2px" }} />
                    </div>
                  </div>
                )}
                {h.type==="weekly"         && <span style={{ fontSize:"12px",fontWeight:"600",color:done?"#4A7459":"#6B8C76",textAlign:"center",lineHeight:1.2 }}>{wc}/{h.targetCount}<br/><span style={{ fontSize:"10px",color:"#bbb" }}>sem.</span></span>}
                {h.type==="daily_multiple" && <span style={{ fontSize:"12px",fontWeight:"600",color:done?"#4A7459":"#6B8C76" }}>{dc}/{h.targetCount}</span>}
                {h.type==="daily" && done  && <span style={{ color:"#4A7459",fontWeight:"700",fontSize:"16px" }}>✓</span>}
                <button onClick={() => sv.habits(habits.filter(x=>x.id!==h.id))} style={{ background:"none",border:"none",cursor:"pointer",color:"#ddd",fontSize:"18px",padding:"2px 4px",lineHeight:1 }}>×</button>
              </div>
              {h.type==="water" && (todayComp[h.id]?.amounts||[]).length>0 && (
                <div style={{ display:"flex",flexWrap:"wrap",gap:"5px",marginTop:"10px",paddingTop:"10px",borderTop:"1px solid rgba(74,116,89,.08)" }}>
                  {(todayComp[h.id]?.amounts||[]).map((ml,i) => (
                    <span key={i} style={{ background:"rgba(74,116,89,.12)",color:"#4A7459",fontSize:"11px",fontWeight:"600",borderRadius:"8px",padding:"3px 8px" }}>+{ml} ml</span>
                  ))}
                </div>
              )}
              {h.type==="weekly" && (
                <div style={{ marginTop:"10px",paddingTop:"10px",borderTop:"1px solid rgba(74,116,89,.08)" }}>
                  <div style={{ fontSize:"10px",color:"#8B9E88",marginBottom:"6px",fontWeight:"500" }}>Progression cette semaine</div>
                  <div style={{ display:"flex",gap:"6px" }}>
                    {JOURS.map((jour,i) => {
                      const isDoneDay = !!comp[weekDays[i]]?.[h.id]?.done;
                      const isToday = weekDays[i] === today;
                      return (
                        <div key={i} style={{ display:"flex",flexDirection:"column",alignItems:"center",gap:"4px" }}>
                          <span style={{ fontSize:"9px",color:isToday?"#4A7459":"#bbb",fontWeight:isToday?"700":"400" }}>{jour}</span>
                          <div style={{ width:"18px",height:"18px",borderRadius:"50%",
                            background:isDoneDay?"#4A7459":"rgba(74,116,89,.12)",
                            border:isToday&&!isDoneDay?"2px solid #4A7459":"none",
                            display:"flex",alignItems:"center",justifyContent:"center" }}>
                            {isDoneDay && <span style={{ color:"white",fontSize:"10px",fontWeight:"700" }}>✓</span>}
                          </div>
                        </div>
                      );
                    })}
                  </div>
                </div>
              )}
            </Glass>
          );
        })}
        {habits.length===0 && <div style={{ textAlign:"center",color:"#8B9E88",padding:"40px",fontSize:"14px" }}>Ajoute ta première habitude ✨</div>}
      </div>

      {waterMod && (
        <div style={{ position:"fixed",inset:0,background:"rgba(0,0,0,.45)",display:"flex",alignItems:"flex-end",justifyContent:"center",zIndex:2000 }}>
          <div style={{ width:"375px",background:"#F6F1E6",borderRadius:"28px 28px 0 0",padding:"24px 20px 44px" }}>
            <div style={{ fontSize:"18px",fontWeight:"600",color:"#2B3D2E",marginBottom:"16px" }}>💧 Ajouter de l'eau</div>
            <div style={{ display:"flex",flexWrap:"wrap",gap:"8px",marginBottom:"14px" }}>
              {[150,250,330,500,750,1000].map(ml => (
                <Btn key={ml} onClick={() => setWaterAmt(String(ml))} style={{ background:waterAmt===String(ml)?"#4A7459":"rgba(74,116,89,.1)",color:waterAmt===String(ml)?"white":"#4A7459",borderRadius:"12px",padding:"8px 14px",fontSize:"13px",fontWeight:"600" }}>{ml} ml</Btn>
              ))}
            </div>
            <Inp value={waterAmt} onChange={e=>setWaterAmt(e.target.value)} type="number" placeholder="Quantité (ml)" />
            <div style={{ display:"flex",gap:"10px",marginTop:"12px" }}>
              <Btn onClick={() => setWaterMod(null)} style={{ flex:1,padding:"13px",background:"rgba(74,116,89,.1)",color:"#4A7459",borderRadius:"14px",fontSize:"14px",fontWeight:"600" }}>Annuler</Btn>
              <Btn onClick={addWater} style={{ flex:2,padding:"13px",background:"#4A7459",color:"white",borderRadius:"14px",fontSize:"14px",fontWeight:"600" }}>+ {waterAmt} ml</Btn>
            </div>
          </div>
        </div>
      )}
      {showAdd && <AddHabitModal habits={habits} sv={sv} onClose={() => setShowAdd(false)} />}
    </div>
  );
}

function AddHabitModal({ habits, sv, onClose }) {
  const [emoji,setEmoji]=useState("⭐"); const [name,setName]=useState("");
  const [type,setType]=useState("daily"); const [cnt,setCnt]=useState("1");
  const [goal,setGoal]=useState("2000"); const [picker,setPicker]=useState(false);
  const EMOJIS=["⭐","💧","🏃","💪","🧘","🥗","🍎","😴","📖","✏️","🎯","🔥","💊","🧴","🪥","⚖️","📸","🚶","🚴","🏋️","🤸","🏊","🧹","🎵","🎨","🌿","☕","🍵","🥤","🛌","🧃","🫧","🧂","🥦","🫀"];
  function add() {
    if (!name.trim()) return;
    sv.habits([...habits, { id:Date.now().toString(), emoji, name:name.trim(), type, targetCount:parseInt(cnt)||1, waterGoal:parseInt(goal)||2000 }]);
    onClose();
  }
  return (
    <div style={{ position:"fixed",inset:0,background:"rgba(0,0,0,.5)",display:"flex",alignItems:"flex-end",justifyContent:"center",zIndex:2000 }}>
      <div style={{ width:"375px",background:"#F6F1E6",borderRadius:"28px 28px 0 0",padding:"24px 20px 44px",maxHeight:"85vh",overflowY:"auto" }}>
        <div style={{ fontSize:"18px",fontWeight:"600",color:"#2B3D2E",marginBottom:"18px" }}>Nouvelle habitude</div>
        <div style={{ marginBottom:"14px" }}>
          <div style={{ fontSize:"10px",color:"#6B8C76",fontWeight:"600",marginBottom:"6px",textTransform:"uppercase",letterSpacing:".08em" }}>Emoji</div>
          <Btn onClick={() => setPicker(!picker)} style={{ fontSize:"26px",background:"rgba(255,255,255,.7)",borderRadius:"12px",width:"48px",height:"48px",border:"1.5px solid rgba(74,116,89,.2)" }}>{emoji}</Btn>
          {picker && <div style={{ display:"flex",flexWrap:"wrap",gap:"6px",marginTop:"8px",background:"rgba(255,255,255,.8)",borderRadius:"14px",padding:"10px" }}>
            {EMOJIS.map(e => <Btn key={e} onClick={() => { setEmoji(e); setPicker(false); }} style={{ fontSize:"22px",background:"none",padding:"4px" }}>{e}</Btn>)}
          </div>}
        </div>
        <div style={{ marginBottom:"14px" }}>
          <div style={{ fontSize:"10px",color:"#6B8C76",fontWeight:"600",marginBottom:"6px",textTransform:"uppercase",letterSpacing:".08em" }}>Nom</div>
          <Inp value={name} onChange={e=>setName(e.target.value)} placeholder="Ex : Boire de l'eau" />
        </div>
        <div style={{ marginBottom:"14px" }}>
          <div style={{ fontSize:"10px",color:"#6B8C76",fontWeight:"600",marginBottom:"8px",textTransform:"uppercase",letterSpacing:".08em" }}>Fréquence</div>
          {[["daily","Chaque jour"],["weekly","X fois par semaine"],["daily_multiple","X fois par jour"],["water","Tracker d'eau (ml)"]].map(([t,lb]) => (
            <Btn key={t} onClick={() => setType(t)} style={{ display:"block",width:"100%",padding:"11px 14px",marginBottom:"7px",
              background:type===t?"#4A7459":"rgba(255,255,255,.7)",color:type===t?"white":"#2B3D2E",
              border:type===t?"none":"1.5px solid rgba(74,116,89,.2)",borderRadius:"13px",fontSize:"13px",fontWeight:"500",textAlign:"left" }}>{lb}</Btn>
          ))}
        </div>
        {(type==="weekly"||type==="daily_multiple") && (
          <div style={{ marginBottom:"14px" }}>
            <div style={{ fontSize:"10px",color:"#6B8C76",fontWeight:"600",marginBottom:"8px",textTransform:"uppercase",letterSpacing:".08em" }}>
              {type==="weekly"?"Fois par semaine":"Fois par jour"}
            </div>
            <div style={{ display:"flex",gap:"7px" }}>
              {[1,2,3,4,5,6,7].map(n => <Btn key={n} onClick={() => setCnt(String(n))} style={{ width:"36px",height:"36px",background:cnt===String(n)?"#4A7459":"rgba(255,255,255,.7)",color:cnt===String(n)?"white":"#2B3D2E",border:cnt===String(n)?"none":"1.5px solid rgba(74,116,89,.2)",borderRadius:"10px",fontSize:"14px",fontWeight:"600" }}>{n}</Btn>)}
            </div>
          </div>
        )}
        {type==="water" && (
          <div style={{ marginBottom:"14px" }}>
            <div style={{ fontSize:"10px",color:"#6B8C76",fontWeight:"600",marginBottom:"8px",textTransform:"uppercase",letterSpacing:".08em" }}>Objectif journalier</div>
            <div style={{ display:"flex",gap:"7px",flexWrap:"wrap" }}>
              {[1500,2000,2500,3000].map(g => <Btn key={g} onClick={() => setGoal(String(g))} style={{ padding:"8px 12px",background:goal===String(g)?"#4A7459":"rgba(255,255,255,.7)",color:goal===String(g)?"white":"#2B3D2E",border:goal===String(g)?"none":"1.5px solid rgba(74,116,89,.2)",borderRadius:"10px",fontSize:"12px",fontWeight:"600" }}>{g} ml</Btn>)}
            </div>
          </div>
        )}
        <div style={{ display:"flex",gap:"10px",marginTop:"8px" }}>
          <Btn onClick={onClose} style={{ flex:1,padding:"13px",background:"rgba(74,116,89,.1)",color:"#4A7459",borderRadius:"14px",fontSize:"14px",fontWeight:"600" }}>Annuler</Btn>
          <Btn onClick={add} style={{ flex:2,padding:"13px",background:"#4A7459",color:"white",borderRadius:"14px",fontSize:"14px",fontWeight:"600" }}>Ajouter</Btn>
        </div>
      </div>
    </div>
  );
}

// ── Progress ──────────────────────────────────────────────
function ProgressScreen({ weight, meas, unit, sv }) {
  const [sec, setSec] = useState("weight");
  const [showW, setShowW] = useState(false); const [wVal, setWVal] = useState("");
  const [showM, setShowM] = useState(false);
  const [mVal, setMVal] = useState({ waist:"",hips:"",chest:"",arms:"",thighs:"",bf:"" });
  const FIELDS = [["waist","Taille"],["hips","Hanches"],["chest","Poitrine"],["arms","Bras"],["thighs","Cuisses"]];

  function addWeight() {
    const w = parseFloat(wVal); if (!w) return;
    const upd = [...weight,{id:Date.now(),date:DAY(),weight:w}].sort((a,b)=>a.date.localeCompare(b.date));
    sv.weight(upd); setWVal(""); setShowW(false);
  }
  function addMeas() {
    const toIn = unit==="in";
    const parse = v => v ? parseFloat(toIn ? parseFloat(v)*2.54 : parseFloat(v)) : null;
    const entry = { id:Date.now(),date:DAY(), waist:parse(mVal.waist),hips:parse(mVal.hips),
      chest:parse(mVal.chest),arms:parse(mVal.arms),thighs:parse(mVal.thighs),
      bf:mVal.bf?parseFloat(mVal.bf):null };
    const upd = [...meas,entry].sort((a,b)=>a.date.localeCompare(b.date));
    sv.meas(upd); setMVal({waist:"",hips:"",chest:"",arms:"",thighs:"",bf:""}); setShowM(false);
  }

  // Weekly weight averages
  const byWeek = {};
  weight.forEach(e => {
    const d=new Date(e.date+"T00:00:00"); const day=d.getDay();
    const diff=d.getDate()-day+(day===0?-6:1); const m=new Date(d); m.setDate(diff);
    const wk=m.toISOString().split("T")[0];
    if(!byWeek[wk]) byWeek[wk]=[]; byWeek[wk].push(e.weight);
  });
  const wkAvg = Object.entries(byWeek).sort(([a],[b])=>a.localeCompare(b))
    .map(([wk,ws]) => ({ wk, avg: ws.reduce((s,v)=>s+v,0)/ws.length }));

  const lastW=weight[weight.length-1]; const prevW=weight[weight.length-2];
  const lastM=meas[meas.length-1]; const prevM=meas[meas.length-2];
  const disp = cm => cm==null ? "—" : unit==="cm" ? `${cm.toFixed(1)} cm` : `${(cm*CM_TO_IN).toFixed(1)}"`;
  const dispN = cm => cm==null ? null : unit==="cm" ? cm : cm*CM_TO_IN;

  function WeightChart() {
    if (wkAvg.length<1) return <div style={{textAlign:"center",color:"#8B9E88",fontSize:"12px",padding:"16px 0"}}>Ajoute des entrées pour voir le graphique 📊</div>;
    if (wkAvg.length===1) return <div style={{textAlign:"center",color:"#4A7459",fontSize:"22px",fontWeight:"700",padding:"8px 0"}}>{wkAvg[0].avg.toFixed(1)} lbs</div>;
    const vals=wkAvg.map(w=>w.avg);
    const mn=Math.min(...vals)-2; const mx=Math.max(...vals)+2; const rng=mx-mn;
    const W=300; const H=70;
    const pts=wkAvg.map((w,i) => ({ x:(i/(wkAvg.length-1))*W, y:H-((w.avg-mn)/rng)*H, v:w.avg }));
    const path=pts.map((p,i)=>`${i===0?"M":"L"} ${p.x} ${p.y}`).join(" ");
    return (
      <svg viewBox={`0 0 ${W} ${H+20}`} style={{width:"100%",height:"90px",overflow:"visible"}}>
        <defs><linearGradient id="wg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor="#4A7459" stopOpacity=".2"/><stop offset="100%" stopColor="#4A7459" stopOpacity="0"/></linearGradient></defs>
        <path d={`${path} L ${W} ${H} L 0 ${H} Z`} fill="url(#wg)"/>
        <path d={path} stroke="#4A7459" strokeWidth="2.5" fill="none" strokeLinecap="round" strokeLinejoin="round"/>
        {pts.map((p,i) => (<g key={i}><circle cx={p.x} cy={p.y} r="3.5" fill="#4A7459"/><text x={p.x} y={p.y-7} textAnchor="middle" fontSize="9" fill="#4A7459" fontFamily="DM Sans" fontWeight="600">{p.v.toFixed(1)}</text></g>))}
      </svg>
    );
  }

  return (
    <div>
      <div style={{ padding:"50px 20px 14px" }}>
        <div style={{ fontSize:"22px",fontWeight:"600",color:"#2B3D2E",fontFamily:"'Cormorant',Georgia,serif",letterSpacing:".05em" }}>Progrès</div>
      </div>
      <div style={{ display:"flex",gap:"8px",padding:"0 16px",marginBottom:"14px" }}>
        {[["weight","⚖️ Poids"],["measurements","📏 Dimensions"]].map(([s,lb]) => (
          <Btn key={s} onClick={() => setSec(s)} style={{ flex:1,padding:"10px",background:sec===s?"#4A7459":"rgba(255,255,255,.5)",color:sec===s?"white":"#6B8C76",borderRadius:"14px",fontSize:"13px",fontWeight:"600" }}>{lb}</Btn>
        ))}
      </div>

      {sec==="weight" && (
        <div style={{ padding:"0 16px",display:"flex",flexDirection:"column",gap:"12px" }}>
          <Glass style={{ padding:"16px 18px" }}>
            <div style={{ display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:"12px" }}>
              <div>
                <div style={{ fontSize:"9px",color:"#6B8C76",textTransform:"uppercase",letterSpacing:".1em",fontWeight:"600" }}>Poids actuel</div>
                <div style={{ fontSize:"26px",fontWeight:"700",color:"#4A7459" }}>{lastW ? `${lastW.weight} lbs` : "— lbs"}</div>
                {lastW&&prevW && <div style={{ fontSize:"12px",color:"#888",marginTop:"1px" }}>{lastW.weight<prevW.weight?"↓":"↑"} {Math.abs(lastW.weight-prevW.weight).toFixed(1)} lbs</div>}
                {wkAvg.length>0 && <div style={{ fontSize:"11px",color:"#8DB89A",marginTop:"3px",fontWeight:"500" }}>Moy. semaine : {wkAvg[wkAvg.length-1]?.avg.toFixed(1)} lbs</div>}
              </div>
              <Btn onClick={() => setShowW(true)} style={{ background:"#4A7459",color:"white",borderRadius:"12px",padding:"8px 14px",fontSize:"12px",fontWeight:"600" }}>+ Ajouter</Btn>
            </div>
            <WeightChart />
          </Glass>
          {weight.length>0 && (
            <Glass style={{ padding:"14px 16px" }}>
              <div style={{ fontSize:"10px",color:"#6B8C76",fontWeight:"600",textTransform:"uppercase",letterSpacing:".1em",marginBottom:"10px" }}>Historique</div>
              {weight.slice().reverse().slice(0,6).map((e,i,arr) => {
                const prev=arr[i+1];
                return (<div key={e.id} style={{ display:"flex",justifyContent:"space-between",alignItems:"center",padding:"7px 0",borderBottom:i<Math.min(arr.length,6)-1?"1px solid rgba(74,116,89,.08)":"none" }}>
                  <span style={{ fontSize:"12px",color:"#6B8C76" }}>{new Date(e.date+"T12:00:00").toLocaleDateString("fr-CA")}</span>
                  <span style={{ fontSize:"14px",fontWeight:"600",color:"#2B3D2E" }}>{e.weight} lbs</span>
                  {prev && <span style={{ fontSize:"11px",color:"#888" }}>{e.weight<prev.weight?"↓":"↑"} {Math.abs(e.weight-prev.weight).toFixed(1)}</span>}
                </div>);
              })}
            </Glass>
          )}
        </div>
      )}

      {sec==="measurements" && (
        <div style={{ padding:"0 16px",display:"flex",flexDirection:"column",gap:"12px" }}>
          <div style={{ display:"flex",justifyContent:"space-between",alignItems:"center" }}>
            <Btn onClick={() => sv.unit(unit==="cm"?"in":"cm")} style={{ background:"rgba(255,255,255,.6)",border:"1.5px solid rgba(74,116,89,.3)",borderRadius:"12px",padding:"8px 14px",fontSize:"13px",fontWeight:"600",color:"#4A7459" }}>
              {unit==="cm" ? "🔄 En pouces" : "🔄 En centimètres"}
            </Btn>
            <Btn onClick={() => setShowM(true)} style={{ background:"#4A7459",color:"white",borderRadius:"12px",padding:"8px 14px",fontSize:"12px",fontWeight:"600" }}>+ Ajouter</Btn>
          </div>
          {lastM ? (
            <Glass style={{ padding:"16px 18px" }}>
              <div style={{ fontSize:"10px",color:"#6B8C76",fontWeight:"600",textTransform:"uppercase",letterSpacing:".1em",marginBottom:"12px" }}>
                Dernière entrée · {new Date(lastM.date+"T12:00:00").toLocaleDateString("fr-CA")}
              </div>
              {FIELDS.map(([key,label]) => {
                const cur=lastM[key]; if (cur==null) return null;
                const prev=prevM?.[key];
                const curD=dispN(cur); const prevD=prev!=null?dispN(prev):null;
                return (
                  <div key={key} style={{ display:"flex",justifyContent:"space-between",alignItems:"center",padding:"9px 0",borderBottom:"1px solid rgba(74,116,89,.08)" }}>
                    <span style={{ fontSize:"13px",color:"#6B8C76",fontWeight:"500" }}>{label}</span>
                    <div style={{ display:"flex",alignItems:"center",gap:"10px" }}>
                      {prevD!=null && curD!=null && Math.abs(curD-prevD)>0.05 && (
                        <span style={{ fontSize:"11px",color:"#888" }}>{curD>prevD?"↑":"↓"} {Math.abs(curD-prevD).toFixed(1)}</span>
                      )}
                      <span style={{ fontSize:"14px",fontWeight:"600",color:"#2B3D2E" }}>{disp(cur)}</span>
                    </div>
                  </div>
                );
              })}
              {lastM.bf!=null && (
                <div style={{ display:"flex",justifyContent:"space-between",alignItems:"center",padding:"9px 0" }}>
                  <span style={{ fontSize:"13px",color:"#6B8C76",fontWeight:"500" }}>% Gras</span>
                  <div style={{ display:"flex",alignItems:"center",gap:"10px" }}>
                    {prevM?.bf!=null && Math.abs(lastM.bf-prevM.bf)>0.05 && <span style={{ fontSize:"11px",color:"#888" }}>{lastM.bf>prevM.bf?"↑":"↓"} {Math.abs(lastM.bf-prevM.bf).toFixed(1)}</span>}
                    <span style={{ fontSize:"14px",fontWeight:"600",color:"#2B3D2E" }}>{lastM.bf}%</span>
                  </div>
                </div>
              )}
            </Glass>
          ) : <div style={{ textAlign:"center",color:"#8B9E88",fontSize:"13px",padding:"32px" }}>Ajoute ta première mesure ! 📏</div>}
          {meas.length>1 && (
            <Glass style={{ padding:"14px 16px" }}>
              <div style={{ fontSize:"10px",color:"#6B8C76",fontWeight:"600",textTransform:"uppercase",letterSpacing:".1em",marginBottom:"10px" }}>Historique</div>
              {meas.slice().reverse().slice(0,4).map(m => (
                <div key={m.id} style={{ padding:"8px 0",borderBottom:"1px solid rgba(74,116,89,.08)" }}>
                  <div style={{ fontSize:"10px",color:"#8B9E88",marginBottom:"5px" }}>{new Date(m.date+"T12:00:00").toLocaleDateString("fr-CA")}</div>
                  <div style={{ display:"flex",flexWrap:"wrap",gap:"6px" }}>
                    {FIELDS.filter(([k])=>m[k]!=null).map(([k,lb]) => (
                      <span key={k} style={{ fontSize:"11px",background:"rgba(74,116,89,.1)",color:"#4A7459",borderRadius:"8px",padding:"3px 8px",fontWeight:"500" }}>{lb}: {disp(m[k])}</span>
                    ))}
                    {m.bf!=null && <span style={{ fontSize:"11px",background:"rgba(74,116,89,.1)",color:"#4A7459",borderRadius:"8px",padding:"3px 8px",fontWeight:"500" }}>Gras: {m.bf}%</span>}
                  </div>
                </div>
              ))}
            </Glass>
          )}
        </div>
      )}

      {showW && (
        <div style={{ position:"fixed",inset:0,background:"rgba(0,0,0,.45)",display:"flex",alignItems:"flex-end",justifyContent:"center",zIndex:2000 }}>
          <div style={{ width:"375px",background:"#F6F1E6",borderRadius:"28px 28px 0 0",padding:"24px 20px 44px" }}>
            <div style={{ fontSize:"18px",fontWeight:"600",color:"#2B3D2E",marginBottom:"14px" }}>⚖️ Entrer mon poids</div>
            <Inp value={wVal} onChange={e=>setWVal(e.target.value)} type="number" step="0.1" placeholder="Ex : 148.5 lbs" />
            <div style={{ display:"flex",gap:"10px",marginTop:"12px" }}>
              <Btn onClick={() => setShowW(false)} style={{ flex:1,padding:"13px",background:"rgba(74,116,89,.1)",color:"#4A7459",borderRadius:"14px",fontSize:"14px",fontWeight:"600" }}>Annuler</Btn>
              <Btn onClick={addWeight} style={{ flex:2,padding:"13px",background:"#4A7459",color:"white",borderRadius:"14px",fontSize:"14px",fontWeight:"600" }}>Sauvegarder</Btn>
            </div>
          </div>
        </div>
      )}
      {showM && (
        <div style={{ position:"fixed",inset:0,background:"rgba(0,0,0,.45)",display:"flex",alignItems:"flex-end",justifyContent:"center",zIndex:2000 }}>
          <div style={{ width:"375px",background:"#F6F1E6",borderRadius:"28px 28px 0 0",padding:"24px 20px 44px",maxHeight:"85vh",overflowY:"auto" }}>
            <div style={{ fontSize:"18px",fontWeight:"600",color:"#2B3D2E",marginBottom:"16px" }}>📏 Mes mesures ({unit})</div>
            {FIELDS.map(([key,label]) => (
              <div key={key} style={{ marginBottom:"10px" }}>
                <div style={{ fontSize:"10px",color:"#6B8C76",fontWeight:"600",marginBottom:"5px",textTransform:"uppercase",letterSpacing:".08em" }}>{label} ({unit})</div>
                <Inp value={mVal[key]} onChange={e=>setMVal(p=>{const n={...p};n[key]=e.target.value;return n;})} type="number" step="0.1" placeholder={`${label} en ${unit}`} />
              </div>
            ))}
            <div style={{ marginBottom:"14px" }}>
              <div style={{ fontSize:"10px",color:"#6B8C76",fontWeight:"600",marginBottom:"5px",textTransform:"uppercase",letterSpacing:".08em" }}>% de gras</div>
              <Inp value={mVal.bf} onChange={e=>setMVal(p=>{const n={...p};n.bf=e.target.value;return n;})} type="number" step="0.1" placeholder="Ex : 22.5 %" />
            </div>
            <div style={{ display:"flex",gap:"10px" }}>
              <Btn onClick={() => setShowM(false)} style={{ flex:1,padding:"13px",background:"rgba(74,116,89,.1)",color:"#4A7459",borderRadius:"14px",fontSize:"14px",fontWeight:"600" }}>Annuler</Btn>
              <Btn onClick={addMeas} style={{ flex:2,padding:"13px",background:"#4A7459",color:"white",borderRadius:"14px",fontSize:"14px",fontWeight:"600" }}>Sauvegarder</Btn>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// ── Photos ────────────────────────────────────────────────
function PhotosScreen({ photos, sv }) {
  const ref = useRef();
  const [delConfirm, setDelConfirm] = useState(null);

  async async function handlePhoto(e) {
    const file = e.target.files[0]; if (!file) return;
    const compressed = await new Promise(res => {
      const reader = new FileReader();
      reader.onload = ev => {
        const img = new Image(); img.onload = () => {
          const c = document.createElement("canvas");
          const r = Math.min(600/img.width, 600/img.height);
          c.width=img.width*r; c.height=img.height*r;
          c.getContext("2d").drawImage(img,0,0,c.width,c.height);
          res(c.toDataURL("image/jpeg",.75));
        }; img.src=ev.target.result;
      }; reader.readAsDataURL(file);
    });
    sv.photos([...photos, {id:Date.now(),date:DAY(),dataUrl:compressed}]);
    e.target.value="";
  }

  function deletePhoto(id) {
    sv.photos(photos.filter(p => p.id !== id));
    setDelConfirm(null);
  }

  return (
    <div>
      <div style={{ padding:"50px 20px 14px",display:"flex",justifyContent:"space-between",alignItems:"center" }}>
        <div style={{ fontSize:"22px",fontWeight:"600",color:"#2B3D2E",fontFamily:"'Cormorant',Georgia,serif",letterSpacing:".05em" }}>Mes Photos</div>
        <Btn onClick={() => ref.current?.click()} style={{ background:"#4A7459",color:"white",borderRadius:"14px",padding:"8px 14px",fontSize:"13px",fontWeight:"600" }}>📸 Ajouter</Btn>
      </div>
      <input ref={ref} type="file" accept="image/*" onChange={handlePhoto} style={{ display:"none" }} />
      {photos.length===0 ? (
        <div style={{ textAlign:"center",padding:"56px 32px" }}>
          <div style={{ fontSize:"52px",marginBottom:"16px" }}>📸</div>
          <div style={{ fontSize:"16px",fontWeight:"600",color:"#2B3D2E",marginBottom:"8px" }}>Aucune photo encore</div>
          <div style={{ fontSize:"13px",color:"#8B9E88" }}>Documente ta progression visuelle !</div>
        </div>
      ) : (
        <div style={{ display:"grid",gridTemplateColumns:"1fr 1fr",gap:"10px",padding:"0 16px" }}>
          {photos.slice().reverse().map(p => (
            <div key={p.id} style={{ borderRadius:"16px",overflow:"hidden",aspectRatio:"1",position:"relative" }}>
              <img src={p.dataUrl} style={{ width:"100%",height:"100%",objectFit:"cover" }} alt="progress" />
              <div style={{ position:"absolute",bottom:0,left:0,right:0,background:"linear-gradient(transparent,rgba(0,0,0,.55))",padding:"8px 10px",display:"flex",justifyContent:"space-between",alignItems:"center" }}>
                <span style={{ fontSize:"10px",color:"white",fontWeight:"500" }}>{new Date(p.date+"T12:00:00").toLocaleDateString("fr-CA")}</span>
                <button onClick={() => setDelConfirm(p.id)} style={{ background:"rgba(255,255,255,.25)",border:"none",borderRadius:"8px",width:"24px",height:"24px",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",fontSize:"12px" }}>🗑️</button>
              </div>
            </div>
          ))}
        </div>
      )}

      {/* Delete confirmation */}
      {delConfirm && (
        <div style={{ position:"fixed",inset:0,background:"rgba(0,0,0,.5)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:2000 }}>
          <div style={{ width:"300px",background:"#F6F1E6",borderRadius:"24px",padding:"24px 20px" }}>
            <div style={{ fontSize:"16px",fontWeight:"600",color:"#2B3D2E",marginBottom:"8px" }}>Supprimer cette photo ?</div>
            <div style={{ fontSize:"13px",color:"#8B9E88",marginBottom:"20px" }}>Cette action est irréversible.</div>
            <div style={{ display:"flex",gap:"10px" }}>
              <Btn onClick={() => setDelConfirm(null)} style={{ flex:1,padding:"12px",background:"rgba(74,116,89,.1)",color:"#4A7459",borderRadius:"12px",fontSize:"14px",fontWeight:"600" }}>Annuler</Btn>
              <Btn onClick={() => deletePhoto(delConfirm)} style={{ flex:1,padding:"12px",background:"#C62828",color:"white",borderRadius:"12px",fontSize:"14px",fontWeight:"600" }}>Supprimer</Btn>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

  </script>
